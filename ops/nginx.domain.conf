# mylogo — domain block (add as separate server {})
# For: https://mylogo.angelstreet.io
# WARNING: Do NOT add "rewrite ^/$ /mylogo/ redirect" here!
#          That causes a redirect loop. Vite's base path handles it.
server {
    listen 443 ssl http2;
    server_name mylogo.angelstreet.io;
    ssl_certificate /etc/ssl/cloudflare/angelstreet.crt;
    ssl_certificate_key /etc/ssl/cloudflare/angelstreet.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://127.0.0.1:5003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
